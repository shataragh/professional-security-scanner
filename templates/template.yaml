# (YAML - Configuration Files)
# Module 1 & 2: Configuration and Scan Profiles
# Example configuration structure used by the scanner

scan_profile: full_scan
output_formats:
  - html
  - json
  - csv

target_url: "https://example.com"
timeout: 30
max_threads: 10

# Scan modules configuration
modules:
  nmap:
    enabled: true
    scan_type: "-sV -sC"
  nikto:
    enabled: true
  nuclei:
    enabled: true
    templates: ["cves", "default-logins"]
